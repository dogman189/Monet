<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ultraexchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── TOKENS ── */
  :root {
    --bg:           #080C14;
    --bg2:          #0D1320;
    --panel:        #111827;
    --panel-hover:  #162033;
    --border:       rgba(56, 189, 248, 0.12);
    --border-hi:    rgba(56, 189, 248, 0.28);
    --cyan:         #38BDF8;
    --cyan-dim:     rgba(56, 189, 248, 0.15);
    --cyan-glow:    rgba(56, 189, 248, 0.35);
    --green:        #10B981;
    --green-dim:    rgba(16, 185, 129, 0.15);
    --red:          #F43F5E;
    --red-dim:      rgba(244, 63, 94, 0.12);
    --text:         #F1F5F9;
    --text-2:       #94A3B8;
    --text-3:       #475569;
    --mono:         'Space Mono', monospace;
    --sans:         'DM Sans', sans-serif;
    --code:         'DM Mono', monospace;
    --radius:       16px;
    --radius-sm:    10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* Subtle scanline texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LAYOUT ── */
  #app {
    display: grid;
    grid-template-columns: 264px 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--cyan);
  }

  .logo-sub {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .sidebar-inputs {
    flex: 1;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    -webkit-app-region: no-drag;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-3);
    padding-left: 2px;
  }

  .field-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 13px;
    color: var(--text);
    font-family: var(--code);
    font-size: 12.5px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .field-input::placeholder { color: var(--text-3); }

  .field-input:focus {
    border-color: var(--border-hi);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }

  .sidebar-actions {
    padding: 16px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-app-region: no-drag;
    border-top: 1px solid var(--border);
  }

  .btn {
    height: 44px;
    border-radius: 22px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

  .btn-primary {
    background: var(--cyan);
    color: #000;
  }
  .btn-primary:not(:disabled):hover {
    background: #7DD3FC;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px var(--cyan-glow);
  }
  .btn-primary:not(:disabled):active { transform: translateY(0); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
  }
  .btn-danger:not(:disabled):hover {
    background: var(--red-dim);
    transform: translateY(-1px);
  }

  /* ── MAIN AREA ── */
  #main {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 0;
    background: var(--bg);
    overflow: hidden;
  }

  .top-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card:hover { background: var(--panel); }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .card-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    transition: color 0.3s;
  }

  .card-value.up   { color: var(--green); }
  .card-value.down { color: var(--red); }

  .card-sub {
    font-family: var(--code);
    font-size: 11px;
    color: var(--text-3);
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 4px;
  }

  .band-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .band-label { color: var(--text-3); }
  .band-upper { color: var(--red); }
  .band-lower { color: var(--green); }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    width: fit-content;
    margin-top: 4px;
    transition: all 0.3s;
  }

  .status-badge.idle {
    background: rgba(71, 85, 105, 0.2);
    color: var(--text-3);
    border: 1px solid rgba(71,85,105,0.3);
  }

  .status-badge.running {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(16,185,129,0.3);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-badge.running .status-dot {
    animation: pulse-dot 1.4s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Portfolio card */
  .holdings-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 2px;
  }

  .holdings-amount {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--cyan);
  }

  .holdings-symbol {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ── LOG TERMINAL ── */
  #log-area {
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .log-header {
    padding: 12px 24px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .log-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .log-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    background: var(--panel);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  #log-output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    font-family: var(--code);
    font-size: 11.5px;
    line-height: 1.8;
    color: var(--text-2);
    scroll-behavior: smooth;
  }

  #log-output::-webkit-scrollbar { width: 4px; }
  #log-output::-webkit-scrollbar-track { background: transparent; }
  #log-output::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

  .log-line { 
    display: flex; 
    gap: 12px;
    padding: 1px 0;
    animation: fade-in 0.3s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-time {
    color: var(--text-3);
    flex-shrink: 0;
    font-size: 10.5px;
  }

  .log-msg { flex: 1; }

  .log-line.buy  .log-msg { color: var(--green); }
  .log-line.sell .log-msg { color: var(--red); }
  .log-line.err  .log-msg { color: var(--red); }
  .log-line.sys  .log-msg { color: var(--cyan); }

  /* ── BOOT OVERLAY ── */
  #boot-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 1000;
    transition: opacity 0.5s, visibility 0.5s;
  }

  #boot-overlay.hidden { opacity: 0; visibility: hidden; }

  .boot-logo {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: -1px;
  }

  .boot-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .boot-msg {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 1px;
    font-family: var(--code);
  }
</style>
</head>
<body>

<!-- Boot overlay while Python backend wakes -->
<div id="boot-overlay">
  <div class="boot-logo">ultraexchange</div>
  <div class="boot-spinner"></div>
  <div class="boot-msg">Initializing engine...</div>
</div>

<div id="app">

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">ultraexchange</div>
      <div class="logo-sub">Algorithmic Engine</div>
    </div>

    <div class="sidebar-inputs">

      <div class="field-group">
        <label class="field-label">API Key</label>
        <input class="field-input" type="password" id="in-api-key" placeholder="CMC Pro key" autocomplete="off" />
      </div>

      <div class="field-group">
        <label class="field-label">Symbol</label>
        <input class="field-input" type="text" id="in-symbol" value="BTC" placeholder="BTC" />
      </div>

      <div class="field-group">
        <label class="field-label">Interval (sec)</label>
        <input class="field-input" type="number" id="in-interval" value="300" min="10" />
      </div>

      <div class="field-group">
        <label class="field-label">Trade Amount ($)</label>
        <input class="field-input" type="number" id="in-trade" value="500" min="1" />
      </div>

      <div class="field-group">
        <label class="field-label">Starting Wallet ($)</label>
        <input class="field-input" type="number" id="in-wallet" value="10000" min="0" />
      </div>

    </div>

    <div class="sidebar-actions">
      <button class="btn btn-primary" id="btn-start">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Initialize Sync
      </button>
      <button class="btn btn-danger" id="btn-stop" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        Terminate
      </button>
    </div>
  </aside>

  <!-- ── MAIN PANEL ── -->
  <main id="main">

    <div class="top-cards">

      <!-- Market Index -->
      <div class="card">
        <div class="card-label">Market Index</div>
        <div class="card-value" id="price-val">$0.00</div>
        <div class="card-sub">
          <div class="band-row">
            <span class="band-label">SMA</span>
            <span id="sma-val">—</span>
          </div>
          <div class="band-row">
            <span class="band-label">Upper Band</span>
            <span class="band-upper" id="upper-val">—</span>
          </div>
          <div class="band-row">
            <span class="band-label">Lower Band</span>
            <span class="band-lower" id="lower-val">—</span>
          </div>
        </div>
      </div>

      <!-- Portfolio -->
      <div class="card">
        <div class="card-label">Available Liquidity</div>
        <div class="card-value" id="usd-val">$0.00</div>
        <div class="holdings-row">
          <span class="holdings-amount" id="crypto-val">0.000000</span>
          <span class="holdings-symbol" id="crypto-sym">UNITS</span>
        </div>
      </div>

      <!-- Status -->
      <div class="card">
        <div class="card-label">Engine Status</div>
        <div id="status-badge" class="status-badge idle">
          <span class="status-dot"></span>
          <span id="status-text">Suspended</span>
        </div>
        <div class="card-sub" style="margin-top:12px">
          <div class="band-row">
            <span class="band-label">Symbol</span>
            <span id="stat-symbol" style="color:var(--text-2)">—</span>
          </div>
          <div class="band-row">
            <span class="band-label">Interval</span>
            <span id="stat-interval" style="color:var(--text-2)">—</span>
          </div>
          <div class="band-row">
            <span class="band-label">Trade Amt</span>
            <span id="stat-trade" style="color:var(--text-2)">—</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Log Terminal -->
    <div id="log-area">
      <div class="log-header">
        <div class="log-title">Activity Log</div>
        <div class="log-count" id="log-count">0 events</div>
      </div>
      <div id="log-output"></div>
    </div>

  </main>
</div>

<script src="renderer.js"></script>
</body>
</html>
